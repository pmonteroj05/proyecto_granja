<!-- En esta pantalla se mostrará:
        ● Información del granjero (dinero, energía, herramientas, etc.)
        ● Inventario
        ● Terreno cultivable (representación visual de parcelas) -->

<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Pantalla de Juego</title>
        <link rel="stylesheet" href="/style.css">
    </head>
    <body id="juego">
        <h1>GRANJA</h1>
        
        <div id="contenedor">
            

            <div class="inventario">
                <a href="./tienda.html"><button class="btn-tienda"><img src="/recursos/pantalla_juego/tienda_icono.png" alt="tienda"></button></a>
                <button class="btn-semilla"><img src="/recursos/pantalla_juego/semillero.png" alt="semillero"></button>
                <button class="btn-herr"><img src="/recursos/pantalla_juego/gestor_herramientas.png" alt="herramientas"></button>
                <button class="btn-fruta"><img src="/recursos/pantalla_juego/frutas_recogida.png" alt="frutas"></button>
            </div>

            <div id="huerto">
                <div class="filaA">
                    <label class="region"><input type="radio" name="cuadricula" value="0"><span class="celda-vista"></span></label>
                    <label class="region"><input type="radio" name="cuadricula" value="1"><span class="celda-vista"></span></label>
                    <label class="region"><input type="radio" name="cuadricula" value="2"><span class="celda-vista"></span></label>
                    <label class="region"><input type="radio" name="cuadricula" value="3"><span class="celda-vista"></span></label>
                </div>
                <div class="filaB">
                    <label class="region"><input type="radio" name="cuadricula" value="4"><span class="celda-vista"></span></label>
                    <label class="region"><input type="radio" name="cuadricula" value="5"><span class="celda-vista"></span></label>
                    <label class="region"><input type="radio" name="cuadricula" value="6"><span class="celda-vista"></span></label>
                    <label class="region"><input type="radio" name="cuadricula" value="7"><span class="celda-vista"></span></label>
                </div>
                <div class="filaC">
                    <label class="region"><input type="radio" name="cuadricula" value="8"><span class="celda-vista"></span></label>
                    <label class="region"><input type="radio" name="cuadricula" value="9"><span class="celda-vista"></span></label>
                    <label class="region"><input type="radio" name="cuadricula" value="10"><span class="celda-vista"></span></label>
                    <label class="region"><input type="radio" name="cuadricula" value="11"><span class="celda-vista"></span></label>
                </div>
                <div class="filaD">
                    <label class="region"><input type="radio" name="cuadricula" value="12"><span class="celda-vista"></span></label>
                    <label class="region"><input type="radio" name="cuadricula" value="13"><span class="celda-vista"></span></label>
                    <label class="region"><input type="radio" name="cuadricula" value="14"><span class="celda-vista"></span></label>
                    <label class="region"><input type="radio" name="cuadricula" value="15"><span class="celda-vista"></span></label>
                </div>
            </div>

        </div>

        <a href="./index.html"><button class="btn-save">Guardar partida</button></a>

    <script type="module" src="/controladores/controlJuego.js"></script>
    </body>
</html>
