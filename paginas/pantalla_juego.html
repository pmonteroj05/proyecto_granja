<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Pantalla de Juego</title>
        <link rel="stylesheet" href="/style.css">
    </head>
    <body id="juego">
        <h1>GRANJA</h1>
        
        <div id="contenedor">
            <a href="/paginas/tienda.html"><button class="btn-tienda"><img src="/recursos/pantalla_juego/tienda_icono.png" alt="tienda"></button></a>

            <div id="infoGranj">
                <p>Información del granjero: </p>
                <ul>
                    <li>Nombre: 
                        <span id="nombre-granjero"></span>
                    </li>
                    <li>Dinero: 
                        <span id="dinero">0</span>
                    </li>
                    <li>Energía:
                        <span id="energia">0</span>
                    </li>
                </ul>
            </div>

            <div class="inventario">
                <p>Inventario</p>
                <div class="botones-semillas"></div>
                <ul>
                    <p>Semillas restantes</p>
                    <ul class="inventario-semillas">
                        
                    </ul>

                    <p>Cantidad de frutos</p>
                    <ul class="frutos">
                        
                    </ul>

                    <p>Usos de herramientas</p>
                    <ul class="herramientas">
                        <li>
                            <img src="/recursos/pantalla_juego/azada.png" alt="azada">
                            <span id="usos-azada"></span>
                        </li>
                        <li>
                            <img src="/recursos/pantalla_juego/hoz.png" alt="hoz">
                            <span id="usos-hoz"></span>
                        </li>
                        <li>
                            <img src="/recursos/pantalla_juego/regadera.png" alt="regadera">
                            <span id="usos-regadera"></span>
                        </li>
                    </ul>
                </ul>
            </div>

    
            <div id="huerto">
                <div class="filaA">
                    <button class="parcela" data-indice="0"><span class="celda-vista"></span></button>
                    <button class="parcela" data-indice="1"><span class="celda-vista"></span></button>
                    <button class="parcela" data-indice="2"><span class="celda-vista"></span></button>
                    <button class="parcela" data-indice="3"><span class="celda-vista"></span></button>
                </div>
                <div class="filaB">
                    <button class="parcela" data-indice="4"><span class="celda-vista"></span></button>
                    <button class="parcela" data-indice="5"><span class="celda-vista"></span></button>
                    <button class="parcela" data-indice="6"><span class="celda-vista"></span></button>
                    <button class="parcela" data-indice="7"><span class="celda-vista"></span></button>
                </div>
                <div class="filaC">
                    <button class="parcela" data-indice="8"><span class="celda-vista"></span></button>
                    <button class="parcela" data-indice="9"><span class="celda-vista"></span></button>
                    <button class="parcela" data-indice="10"><span class="celda-vista"></span></button>
                    <button class="parcela" data-indice="11"><span class="celda-vista"></span></button>
                </div>
                <div class="filaD">
                    <button class="parcela" data-indice="12"><span class="celda-vista"></span></button>
                    <button class="parcela" data-indice="13"><span class="celda-vista"></span></button>
                    <button class="parcela" data-indice="14"><span class="celda-vista"></span></button>
                    <button class="parcela" data-indice="15"><span class="celda-vista"></span></button>
                </div>
            </div>

            <div id="guardados">
                <button class="btn-save">Guardar partida</button>
                <button class="btn-cont">Guardar y continuar</button>
            </div>
        </div>

    <script type="module" src="/controladores/controlJuego.js"></script>
    </body>
</html>
